<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Oracle — daily edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 675px; overflow: hidden; background: #060505; font-family: "IBM Plex Mono", monospace; }
  .board {
    width: 1200px; height: 675px;
    background: radial-gradient(900px 380px at 50% -8%, rgba(217,160,63,.07), transparent 60%), #0C0B09;
    color: #EDE6D6; padding: 42px 56px 30px;
    display: flex; flex-direction: column;
  }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(237,230,214,.16); padding-bottom: 18px; }
  .brand { font-family: "Fraunces", serif; font-weight: 500; font-size: 44px; }
  .brand em { font-style: italic; color: #D9A03F; }
  .issue { font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: #9A937F; }
  .issue b { color: #D9A03F; font-weight: 500; }
  .rows { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; }
  .q { display: flex; justify-content: space-between; align-items: center; gap: 40px; }
  .q .d { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: #D9A03F; margin-bottom: 8px; }
  .q .t { font-family: "Fraunces", serif; font-weight: 500; font-size: 27px; line-height: 1.3; max-width: 820px; }
  .num { font-family: "Fraunces", serif; font-weight: 600; font-size: 64px; white-space: nowrap; }
  .num small { font-size: 28px; color: #9A937F; font-weight: 400; }
  .subs { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #5E5949; text-align: right; margin-top: 4px; }
  .sealed { border: 1px solid #D9A03F; color: #D9A03F; padding: 8px 16px; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; transform: rotate(-4deg); display: inline-block; }
  .up { color: #8DB580; } .down { color: #C7604F; }
  .foot { display: flex; justify-content: space-between; border-top: 1px solid rgba(237,230,214,.1); padding-top: 16px; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: #5E5949; }
  .foot b { color: #EDE6D6; font-weight: 500; }
</style>
</head>
<body>
<div class="board">
  <div class="head">
    <div class="brand">THE <em>ORACLE</em></div>
    <div class="issue">DAY <b id="day">—</b> · <span id="date">—</span> · <b id="n">—</b> BUILDERS</div>
  </div>
  <div class="rows" id="rows"></div>
  <div class="foot">
    <span>WHAT THE PEOPLE BUILDING AI BELIEVE ABOUT WHAT'S COMING</span>
    <span><b>aimmo-oracle.vercel.app</b> · NO MONEY, EVER</span>
  </div>
</div>
<script>
const URL_ = "https://hzasywatskzapyfegnfb.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6YXN5d2F0c2t6YXB5ZmVnbmZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDUyNjMsImV4cCI6MjA5ODYyMTI2M30.CYFw_1qVkIUcAXIM0cCrIwlfzS8mEQRP-M6dwlnFvB8";
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
(async () => {
  const d = new URLSearchParams(location.search).get("d") || new Date().toISOString().slice(0, 10);
  document.getElementById("day").textContent = String(Math.max(1, Math.round((new Date(d + "T00:00:00Z") - new Date("2026-07-03T00:00:00Z")) / 864e5) + 1)).padStart(3, "0");
  document.getElementById("date").textContent = new Date(d + "T12:00:00Z").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric", timeZone: "UTC" }).toUpperCase();
  const H = { apikey: KEY, Authorization: "Bearer " + KEY };
  try {
    const [stats] = await (await fetch(`${URL_}/rest/v1/public_stats?select=*`, { headers: H })).json();
    document.getElementById("n").textContent = stats.builders;
  } catch {}
  const qs = await (await fetch(`${URL_}/rest/v1/public_dashboard?select=*&publish_date=eq.${d}&order=domain.asc`, { headers: H })).json();
  document.getElementById("rows").innerHTML = qs.slice(0, 3).map((q) => {
    let right;
    if (q.status === "resolved") right = `<div style="text-align:right"><span class="num ${q.outcome ? "up" : "down"}" style="font-size:44px">${q.outcome ? "YES" : "NO"}</span><div class="subs">crowd said ${q.crowd_percent ?? "—"}%</div></div>`;
    else if (q.crowd_percent == null) right = `<div style="text-align:right"><span class="sealed">Sealed</span><div class="subs">${q.n} of 5 forecasters</div></div>`;
    else {
      const prev = q.crowd_percent_24h_ago ?? q.crowd_percent, del = q.crowd_percent - prev;
      right = `<div style="text-align:right"><span class="num">${q.crowd_percent}<small>%</small></span><div class="subs">${del !== 0 ? `<span class="${del > 0 ? "up" : "down"}">${del > 0 ? "▲" : "▼"}${Math.abs(del)} overnight</span> · ` : ""}n=${q.n}</div></div>`;
    }
    return `<div class="q"><div><div class="d">${esc(q.domain)}</div><div class="t">${esc(q.title)}</div></div>${right}</div>`;
  }).join("") || '<div class="q"><div class="t">No questions this day.</div></div>';
})();
</script>
</body>
</html>
